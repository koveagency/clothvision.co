<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- LUMIÈRE — Gem with radiating light -->
  <!-- Outer rays -->
  <g stroke="#D4B896" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="100" y1="12" x2="100" y2="28" stroke-width="2.5"/>
    <line x1="100" y1="172" x2="100" y2="188" stroke-width="2.5"/>
    <line x1="12" y1="100" x2="28" y2="100" stroke-width="2.5"/>
    <line x1="172" y1="100" x2="188" y2="100" stroke-width="2.5"/>
    <line x1="29" y1="29" x2="41" y2="41" stroke-width="2"/>
    <line x1="159" y1="29" x2="147" y2="41" stroke-width="2"/>
    <line x1="29" y1="171" x2="41" y2="159" stroke-width="2"/>
    <line x1="159" y1="171" x2="147" y2="159" stroke-width="2"/>
  </g>
  <!-- Gem shape (octagon) -->
  <polygon points="100,42 130,55 148,82 148,118 130,145 100,158 70,145 52,118 52,82 70,55" fill="#D4B896"/>
  <!-- Inner gem facet -->
  <polygon points="100,58 122,68 134,88 134,112 122,132 100,142 78,132 66,112 66,88 78,68" fill="#8B7355" opacity="0.6"/>
  <!-- Highlight -->
  <polygon points="100,62 118,70 126,86 100,86" fill="#F5E6D3" opacity="0.5"/>
</svg>
