<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- NOCTIS — Angular crescent moon, dark/gothic -->
  <!-- Outer circle (moon) -->
  <circle cx="100" cy="100" r="72" fill="#8B0000"/>
  <!-- Inner circle offset to create crescent -->
  <circle cx="125" cy="88" r="60" fill="#030303"/>
  <!-- Silver edge glow on crescent -->
  <clipPath id="cresClip">
    <path d="M100,100 m-72,0 a72,72 0 1,0 144,0 a72,72 0 1,0 -144,0"/>
  </clipPath>
  <!-- Star dots -->
  <circle cx="148" cy="68" r="3.5" fill="#B0B0B0"/>
  <circle cx="160" cy="95" r="2" fill="#B0B0B0" opacity="0.7"/>
  <circle cx="145" cy="118" r="2.5" fill="#B0B0B0" opacity="0.5"/>
</svg>
